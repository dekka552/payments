<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Месячные траты</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 60%;
            margin: 0 auto;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        tfoot td {
            font-weight: bold;
            background: #eee;
        }
    </style>
</head>
<body>

<h1>Месячные траты</h1>

<table>
    <thead>
        <tr>
            <th>Категория</th>
            <th>Сумма (€)</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
    <tfoot>
        <tr>
            <td>Итого</td>
            <td id="total">0</td>
        </tr>
    </tfoot>
</table>

<script>
fetch('data.json')
    .then(response => response.json())
    .then(data => {
        const tbody = document.getElementById('table-body');
        let total = 0;

        data.forEach(item => {
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>${item.category}</td>
                <td>${item.amount}</td>
            `;

            tbody.appendChild(row);
            total += item.amount;
        });

        document.getElementById('total').textContent = total.toFixed(2);
    })
    .catch(err => {
        alert("Ошибка загрузки data.json\nОткрой через локальный сервер!");
        console.error(err);
    });
</script>

</body>
</html>
